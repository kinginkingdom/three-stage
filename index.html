<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>three-stage dev</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #0b1020;
        color: #e6e8ef;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
      }
      #app {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        padding: 10px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        gap: 12px;
        align-items: center;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      small {
        opacity: 0.8;
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
      }
      button {
        margin-left: auto;
        padding: 6px 12px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        color: inherit;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      .tip-popup {
        position: fixed;
        left: 0;
        top: 0;
        transform: translate(-50%, -100%);
        margin-top: -8px;
        padding: 8px 12px;
        background: rgba(11, 16, 32, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        font-size: 13px;
        pointer-events: none;
        z-index: 100;
        min-width: 100px;
        will-change: transform;
      }
      .tip-popup .label {
        color: rgba(255, 255, 255, 0.6);
        font-size: 11px;
      }
      .tip-popup .value {
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <strong>three-stage</strong>
        <small>Click objects to highlight. Replace <code>MODEL_URL</code> in <code>examples/main.ts</code>.</small>
        <button id="toggle-pipe" type="button">管道 显示</button>
        <span style="margin-left: 12px; opacity: 0.7;">巡检:</span>
        <button id="inspect-prev" type="button">上一站</button>
        <button id="inspect-next" type="button">下一站</button>
        <button id="inspect-restore" type="button">恢复</button>
        <small id="inspect-info" style="margin-left: 8px;">0/0</small>
        <span style="margin-left: 12px; opacity: 0.7;">视角:</span>
        <button id="view-front" type="button">前</button>
        <button id="view-top" type="button">上</button>
        <button id="view-topLeft" type="button">左上</button>
        <button id="view-topRight" type="button">右上</button>
      </header>
      <canvas id="c"></canvas>
      <div id="tip-popups"></div>
    </div>
    <script type="module" src="/examples/main.ts"></script>
  </body>
</html>
